<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitCall — Connexion</title>
  <style>
    :root {
      --bg: #f6f6f1;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #737373;
      --border: #e5e5e0;
      --accent: #1d4ed8;
      --accent-soft: #eff6ff;
      --red: #dc2626;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 370px;
      padding: 24px;
    }
    .logo-block {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-img {
      height: 56px;
      width: auto;
      mix-blend-mode: multiply;
      display: block;
      margin: 0 auto 6px;
    }
    .logo-tagline {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .card {
      background: var(--surface);
      border-radius: 10px;
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 14px;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .btn-login {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: default; }
    .error-msg {
      background: #fef2f2;
      color: var(--red);
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      border-top: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--bg);
    }
    .footer-left { font-size: 12px; color: var(--muted); }
    .footer-right { display: flex; align-items: center; gap: 16px; }
    .footer-contact { font-size: 12px; color: var(--muted); }
    .footer-contact a { color: var(--muted); text-decoration: none; }
    .footer-contact a:hover { color: var(--text); }
    .footer-sep { color: var(--border); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-block">
      <img src="/logo.png" alt="PitCall" class="logo-img">
      <div class="logo-tagline">Espace garagiste</div>
    </div>
    <div class="card">
      <h2>Connexion</h2>
      <form id="login-form">
        <div class="field">
          <label for="username">Identifiant</label>
          <input type="text" id="username" name="username" autocomplete="username" placeholder="Votre identifiant" required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login" id="btn-submit">Se connecter</button>
        <div class="error-msg" id="error-msg"></div>
      </form>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-left">© 2025 PitCall &nbsp;·&nbsp; v1.0.0</div>
    <div class="footer-right">
      <span class="footer-contact">Support : <a href="mailto:louis.becker@pitcall.fr">louis.becker@pitcall.fr</a></span>
      <span class="footer-sep">|</span>
      <span class="footer-contact"><a href="tel:+33637760448">06 37 76 04 48</a></span>
    </div>
  </footer>

  <script>
    const TOKEN_KEY = 'pitcall_token';

    // Déjà connecté ?
    if (localStorage.getItem(TOKEN_KEY)) {
      window.location.href = '/dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Connexion…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur de connexion.');
        localStorage.setItem(TOKEN_KEY, data.token);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
