<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MechaniCall — Connexion</title>
  <style>
    :root {
      --blue: #1d4ed8;
      --blue-dark: #1e40af;
      --blue-soft: #dbeafe;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .logo-block {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      font-size: 42px;
      margin-bottom: 8px;
    }
    .logo-name {
      font-size: 26px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: -0.5px;
    }
    .logo-tagline {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.92; }
    .btn-login:disabled { opacity: 0.6; cursor: default; }
    .error-msg {
      background: #fef2f2;
      color: var(--red);
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-block">
      <div class="logo-icon">🔔</div>
      <div class="logo-name">MechaniCall</div>
      <div class="logo-tagline">Espace garagiste</div>
    </div>
    <div class="card">
      <h2>Connexion</h2>
      <form id="login-form">
        <div class="field">
          <label for="username">Identifiant</label>
          <input type="text" id="username" name="username" autocomplete="username" placeholder="Votre identifiant" required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login" id="btn-submit">Se connecter</button>
        <div class="error-msg" id="error-msg"></div>
      </form>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'mechanicall_token';

    // Déjà connecté ?
    if (localStorage.getItem(TOKEN_KEY)) {
      window.location.href = '/dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Connexion…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur de connexion.');
        localStorage.setItem(TOKEN_KEY, data.token);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
