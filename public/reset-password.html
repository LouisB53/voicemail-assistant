<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitCall — Nouveau mot de passe</title>
  <style>
    :root {
      --bg: #f6f6f1;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #737373;
      --border: #e5e5e0;
      --accent: #1d4ed8;
      --accent-soft: #eff6ff;
      --red: #dc2626;
      --green: #16a34a;
      --green-soft: #f0fdf4;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .wrap { width: 100%; max-width: 370px; padding: 24px; }
    .logo-block { text-align: center; margin-bottom: 28px; }
    .logo-img { height: 56px; width: auto; mix-blend-mode: multiply; display: block; margin: 0 auto 6px; }
    .logo-tagline { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .card { background: var(--surface); border-radius: 10px; padding: 28px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .card h2 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
    input {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: 14px; color: var(--text); background: white; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .btn {
      width: 100%; padding: 10px;
      background: var(--accent); color: white;
      border: none; border-radius: 7px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin-top: 6px; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .msg {
      border-radius: 6px; padding: 9px 12px;
      font-size: 13px; margin-top: 12px; display: none;
    }
    .msg.error { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }
    .msg.success { background: var(--green-soft); color: var(--green); border: 1px solid #bbf7d0; }
    .site-footer {
      margin-top: 24px; font-size: 12px; color: var(--muted);
      text-align: center;
    }
    .site-footer a { color: var(--muted); text-decoration: none; }
    .site-footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-block">
      <img src="/logo.png" alt="PitCall" class="logo-img">
      <div class="logo-tagline">Espace garagiste</div>
    </div>
    <div class="card" id="form-card">
      <h2>Nouveau mot de passe</h2>
      <p class="card-sub">Choisissez un mot de passe d'au moins 8 caractères.</p>
      <div class="field">
        <label for="password">Nouveau mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="field">
        <label for="confirm">Confirmer le mot de passe</label>
        <input type="password" id="confirm" placeholder="••••••••" required>
      </div>
      <button class="btn" id="btn-submit" onclick="submitReset()">Enregistrer</button>
      <div class="msg error" id="msg-error"></div>
      <div class="msg success" id="msg-success"></div>
    </div>
  </div>

  <footer class="site-footer">
    © 2025 PitCall &nbsp;·&nbsp; <a href="mailto:louis.becker@pitcall.fr">louis.becker@pitcall.fr</a> &nbsp;·&nbsp; <a href="tel:+33637760448">06 37 76 04 48</a>
  </footer>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('form-card').innerHTML = `
        <h2>Lien invalide</h2>
        <p class="card-sub" style="margin-bottom:0;">Ce lien de réinitialisation est invalide ou a expiré.<br><a href="/login.html" style="color:#1d4ed8;">Retour à la connexion</a></p>
      `;
    }

    async function submitReset() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errEl = document.getElementById('msg-error');
      const okEl = document.getElementById('msg-success');
      const btn = document.getElementById('btn-submit');
      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (password !== confirm) {
        errEl.textContent = 'Les mots de passe ne correspondent pas.';
        errEl.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Enregistrement…';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Enregistrer';
          return;
        }
        okEl.textContent = 'Mot de passe mis à jour. Redirection…';
        okEl.style.display = 'block';
        document.getElementById('form-card').querySelector('button').style.display = 'none';
        setTimeout(() => window.location.href = '/login.html', 2000);
      } catch {
        errEl.textContent = 'Erreur réseau.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Enregistrer';
      }
    }
  </script>
</body>
</html>
